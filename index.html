<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Lesson 5 영어 문장을 듣고 한국어 조각을 순서대로 배열하는 모바일 학습 프로그램">
  <meta name="theme-color" content="#3f7d00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="문장 학습">
  <title>Lesson 5 문장 학습</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%233f7d00'/%3E%3Cpath d='M18 36v-8a14 14 0 0 1 28 0v8M20 36h-4v10h4M44 36h4v10h-4' fill='none' stroke='white' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="./styles.css">
  <script src="./app.js" defer></script>
</head>
<body>
  <main class="app-shell">
    <section id="home" class="home-screen" aria-labelledby="home-title">
      <h1 id="home-title" class="home-title" tabindex="-1">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 14v-2a8 8 0 0 1 16 0v2"></path>
          <path d="M18 19h1a2 2 0 0 0 2-2v-3h-3z"></path>
          <path d="M6 19H5a2 2 0 0 1-2-2v-3h3z"></path>
        </svg>
        문장 학습
      </h1>
      <p class="home-description">
        Lesson 5 · The Team Behind the Team<br>
        음성을 듣고 한국어 단어를 순서대로 조합해 해석을 완성하세요.
      </p>

      <button class="passage-card" type="button" data-passage="0">
        <span class="passage-card__icon" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24">
            <circle cx="9" cy="5" r="2"></circle>
            <path d="m7 22 2-7 2 2 3 5"></path>
            <path d="m6 11 3-3 3 2 3 1"></path>
            <path d="m14 8 3-2"></path>
          </svg>
        </span>
        <span class="passage-card__copy">
          <span class="passage-card__title">Reading 1</span>
          <span class="passage-card__description">Hidden People in Sports / Pacers</span>
        </span>
        <span class="passage-card__meta">
          <span class="sentence-count">13문장</span>
          <span class="best-score" id="best-0"></span>
        </span>
      </button>

      <button class="passage-card" type="button" data-passage="1">
        <span class="passage-card__icon" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M5 17h14"></path>
            <path d="m6 17-2-5h4l2-4h5l2 4h3v5"></path>
            <circle cx="7" cy="17" r="2"></circle>
            <circle cx="17" cy="17" r="2"></circle>
          </svg>
        </span>
        <span class="passage-card__copy">
          <span class="passage-card__title">Reading 2</span>
          <span class="passage-card__description">Pit Crews / Sherpas</span>
        </span>
        <span class="passage-card__meta">
          <span class="sentence-count">15문장</span>
          <span class="best-score" id="best-1"></span>
        </span>
      </button>

      <p class="home-note">
        음성은 프로그램에 포함되어 있습니다. Reading을 누르면 첫 문장이 재생되며,
        이후에는 문장 이동 버튼을 누를 때마다 자동으로 들을 수 있습니다.
      </p>
    </section>

    <section id="lesson" class="lesson-screen is-hidden" aria-labelledby="prompt">
      <header class="topbar">
        <button class="icon-button" id="quit" type="button" aria-label="학습 종료">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
        </button>
        <div
          class="progress"
          id="progress"
          role="progressbar"
          aria-label="학습 진행률"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
        >
          <div class="progress__bar" id="progress-bar"></div>
        </div>
        <div class="score-chip" id="score-chip" aria-label="현재 점수">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m12 2 3 6 7 .9-5 4.8 1.2 6.8L12 17.3 5.8 20.5 7 13.7 2 8.9 9 8z"></path></svg>
          <span id="score-value">0</span>
          <span class="combo" id="combo"></span>
        </div>
      </header>

      <div class="lesson-body" id="lesson-body">
        <div id="section-title" class="section-title is-hidden"></div>
        <div id="prompt" class="prompt" tabindex="-1">음성을 듣고 해석을 완성하세요</div>

        <div class="listen-row">
          <button class="audio-button" id="play" type="button" aria-label="영어 문장 다시 듣기">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M11 5 6 9H3v6h3l5 4z"></path>
              <path d="M15 9a4 4 0 0 1 0 6"></path>
              <path d="M18 6a8 8 0 0 1 0 12"></path>
            </svg>
          </button>
          <button class="audio-button audio-button--slow" id="play-slow" type="button" aria-label="영어 문장 천천히 듣기">0.7×</button>
          <div class="english-sentence" id="english"></div>
        </div>

        <div class="answer" id="answer" aria-label="선택한 해석"></div>
        <div class="word-bank" id="word-bank" aria-label="선택할 단어"></div>

        <div class="feedback is-hidden" id="feedback" role="status" aria-live="polite">
          <div class="feedback__title" id="feedback-title"></div>
          <div class="feedback__answer" id="feedback-answer"></div>
          <div class="feedback__points" id="feedback-points"></div>
        </div>
        <p class="audio-status" id="audio-status" role="status" aria-live="polite"></p>
      </div>

      <footer class="footer-actions">
        <button class="action-button" id="action" type="button" disabled>정답 확인</button>
      </footer>
    </section>

    <section id="result" class="result-screen is-hidden" aria-labelledby="result-title">
      <div class="result-mark" aria-hidden="true">
        <svg class="icon" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"></path></svg>
      </div>
      <div class="result-stars" id="result-stars" aria-label="획득 별"></div>
      <h2 class="result-title" id="result-title" tabindex="-1"></h2>
      <p class="result-grade" id="result-grade"></p>
      <div class="new-best is-hidden" id="new-best">최고 점수를 경신했습니다.</div>
      <div class="result-stats">
        <div class="result-stat result-stat--gold"><strong id="result-score">0</strong><span>점수</span></div>
        <div class="result-stat"><strong id="result-accuracy">0%</strong><span>정확도</span></div>
        <div class="result-stat"><strong id="result-correct">0</strong><span>한 번에 정답</span></div>
      </div>
      <div class="result-actions">
        <button class="action-button" id="again" type="button">다시 풀기</button>
        <button class="action-button action-button--secondary" id="home-button" type="button">지문 선택으로</button>
      </div>
    </section>
  </main>

  <audio id="sentence-audio" preload="auto" playsinline></audio>
</body>
</html>
